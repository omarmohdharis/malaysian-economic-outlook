name: Monthly Pipeline + Publish

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 7 * *'   # 7th of each month — data.gov.my typically publishes by then
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Point Quarto at the correct Python
        run: echo "QUARTO_PYTHON=$(which python)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -r requirements.txt

      # The warehouse is rebuilt from scratch each run, so CDC state
      # (change log, history tables) is restored from committed parquet
      # files first — otherwise every run would look like a cold load.
      - name: Restore CDC state
        working-directory: ingestion
        run: python state.py import

      - name: Run extraction
        working-directory: ingestion
        run: python extract.py

      - name: Run CDC
        working-directory: ingestion
        run: python cdc.py

      - name: Export CDC state
        working-directory: ingestion
        run: python state.py export

      - name: Run dbt transforms
        working-directory: transforms
        run: |
          dbt deps
          dbt run
          dbt test

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render dashboard
        run: quarto render dashboard/index.qmd --output-dir ../docs

      - name: Commit rendered docs and CDC state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          git diff --staged --quiet || git commit -m "chore: render pipeline run ${{ github.run_id }}"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
